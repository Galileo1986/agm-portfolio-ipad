<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AGM Portfolio">

  <title>Atelier Galileo Morandi — Portfolio for iPad</title>
  <meta name="description" content="Atelier Galileo Morandi — Design Studio Portfolio for iPad presentations">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="css/styles-ipad.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">AGM&copy;</a>
      <div class="nav__links">
        <a href="index.html" class="nav__link">HOME</a>
        <a href="works.html" class="nav__link">WORKS</a>
      </div>
      <span class="nav__clock" id="clock"></span>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero__content">
      <h1 class="hero__heading">ATELIER GALILEO MORANDI</h1>
      <p class="hero__subtitle">DESIGN STUDIO FROM LOS ANGELES</p>
    </div>
    <div class="hero__divider"></div>
  </section>

  <!-- Selected Works -->
  <section class="section" id="selectedWorks">
    <div class="section__inner">
      <div class="works__header">
        <h2 class="works__title">SELECTED WORKS</h2>
      </div>
      <div class="works__grid" id="worksGrid"></div>
    </div>
  </section>

  <!-- Services -->
  <section class="section" id="services">
    <div class="section__inner">
      <h2 class="services__title">SERVICES</h2>
      <div class="services__grid" id="servicesGrid"></div>
    </div>
  </section>

  <!-- About -->
  <section class="section" id="about">
    <div class="section__inner">
      <h2 class="about__title">ABOUT</h2>
      <div class="about__grid">
        <div class="about__text" id="aboutText"></div>
        <img class="about__portrait" src="images/services/GALILEO MORANDI PORTRAIT.JPG" alt="Galileo Morandi — portrait" loading="lazy">
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer__inner">
      <span class="footer__copyright">&copy; 2026 ATELIER GALILEO MORANDI</span>
    </div>
  </footer>

  <script src="data-ipad.js"></script>
  <script src="js/main.js"></script>
  <script src="js/hero-blur.js"></script>
</body>
</html>
